[workspace]
resolver = "2"
members = ["shared", "cli", "browser-wasm"]
default-members = ["cli"]

[workspace.dependencies]
# we define iroh dependencies here to make upgrading easier.
iroh = { version = "0.97", default-features = false, features = ["tls-ring"] }
iroh-tickets = "0.4"
iroh-gossip = { version = "0.97", default-features = false, features = ["net"] }

[patch.crates-io]
iroh = { git = "https://github.com/n0-computer/iroh.git", branch = "main" }
iroh-base = { git = "https://github.com/n0-computer/iroh.git", branch = "main" }
iroh-relay = { git = "https://github.com/n0-computer/iroh.git", branch = "main" }
iroh-gossip = { git = "https://github.com/n0-computer/iroh-gossip.git", branch = "deps/iroh-main" }
